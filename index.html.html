<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #eef2f7;
}

#kartaWrapper {
  width: 90%;
  max-width: 600px;
  margin: 20px auto;
  border: 2px solid black;
}

#karta {
  position: relative;
}

#karta img {
  width: 100%;
}

/* ✅ klick går igenom ringar */
.plats {
  position: absolute;
  width: 30px;
  height: 30px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#editor, #scan, #fragaRuta {
  display: none;
  background: white;
  padding: 15px;
  width: 300px;
  margin: 10px auto;
  border-radius: 10px;
}

video {
  width: 100%;
}

button {
  padding: 10px;
  margin: 5px;
}
</style>

</head>

<body>

<h1>🗺️ Kartjakten</h1>

<input type="file" accept="image/*" id="kartInput">
<p id="info">1. Ladda karta → 2. Klicka Redigera</p>

<button onclick="setMode('edit')">🧑‍🏫 Redigera</button>
<button onclick="setMode('play')">▶️ Spela</button>

<br><br>

<button onclick="sparaBana()">💾 Spara bana</button>
<input type="file" id="laddaInput">

<p>Poäng: <span id="poang">0</span> | Tid: <span id="tid">0</span></p>

<div id="kartaWrapper">
  <div id="karta">
    <img id="bild">
  </div>
</div>

<p id="feedback"></p>

<!-- EDITOR -->
<div id="editor">
  <h3>Ny kontroll</h3>

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input type="file" id="bildInput"><br><br>
  <input id="svarInput" placeholder="Rätt svar"><br><br>

  <button onclick="spara()">Spara</button>
</div>

<!-- SCAN -->
<div id="scan">
  <h3>📸 Hitta platsen</h3>

  <img id="referens" width="100%"><br><br>

  <video id="video" autoplay></video><br>

  <button onclick="startCamera()">Start kamera</button>
  <button onclick="klarScan()">✅ Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElever">
  <button onclick="kolla()">Svara</button>
  <p id="feedbackSvar"></p>
</div>

<script>
let bana = [];
let mode = "none";

let tempX=0, tempY=0;
let steg=0, poang=0, tid=0, timer=null;

// ✅ LADDA KARTA
document.getElementById("kartInput").addEventListener("change", function(e){
  let reader = new FileReader();
  reader.onload = ev => bild.src = ev.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// ✅ LADDA BANA
document.getElementById("laddaInput").addEventListener("change", function(e){
  let reader = new FileReader();
  reader.onload = ev => {
    bana = JSON.parse(ev.target.result);

    document.querySelectorAll(".plats").forEach(p => p.remove());

    bana.forEach(k=>{
      let p = document.createElement("div");
      p.className = "plats";
      p.style.top = k.top + "px";
      p.style.left = k.left + "px";
      karta.appendChild(p);
    });

    alert("✅ Bana laddad");
  };
  reader.readAsText(e.target.files[0]);
});

// ✅ KLICK PÅ KARTA (STABIL)
document.getElementById("karta").addEventListener("click", function(e){

  if(mode !== "edit") return;

  let rect = bild.getBoundingClientRect();

  tempX = e.clientX - rect.left;
  tempY = e.clientY - rect.top;

  document.getElementById("editor").style.display = "block";
});

// ✅ LÄGE
function setMode(m){
  mode = m;

  if(m==="edit"){
    feedback.innerText = "👉 Klicka på kartan för att skapa kontroll";
  }

  if(m==="play"){
    if(bana.length===0){
      alert("Skapa bana först!");
      return;
    }
    startSpel();
  }
}

// ✅ SPARA KONTROLL
function spara(){
  let obj = {
    top: tempY,
    left: tempX,
    fraga: fragaInput.value,
    svar: svarInput.value,
    bild: null
  };

  let file = bildInput.files[0];
  if(file){
    let reader = new FileReader();
    reader.onload = e => obj.bild = e.target.result;
    reader.readAsDataURL(file);
  }

  bana.push(obj);

  let p = document.createElement("div");
  p.className = "plats";
  p.style.top = tempY + "px";
  p.style.left = tempX + "px";

  karta.appendChild(p);

  editor.style.display = "none";

  fragaInput.value="";
  svarInput.value="";
  bildInput.value="";
}

// ✅ START SPEL
function startSpel(){

  steg=0;
  poang=0;
  tid=0;

  timer = setInterval(()=>{
    tid++;
    document.getElementById("tid").innerText = tid;
  },1000);

  visaKarta();
}

// ✅ VISA KARTA
function visaKarta(){

  let k = bana[steg];
  let p = document.querySelector(".plats");

  p.style.top = k.top + "px";
  p.style.left = k.left + "px";

  referens.src = k.bild;

  scan.style.display = "block";
  fragaRuta.style.display = "none";
}

// ✅ KAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
    .then(s => video.srcObject = s);
}

// ✅ SCAN
function klarScan(){

  if(!video.srcObject){
    alert("Starta kameran först!");
    return;
  }

  scan.style.display = "none";
  fragaRuta.style.display = "block";

  fragaText.innerText = bana[steg].fraga;
}

// ✅ SVAR
function kolla(){
  let val = svarElever.value.toLowerCase();

  if(val === bana[steg].svar.toLowerCase()){
    poang++;
    poangEl.innerText = poang;

    steg++;

    if(steg < bana.length){
      visaKarta();
    } else {
      clearInterval(timer);
      alert("🎉 Klar! Tid: " + tid + " sek");
    }
  } else {
    feedbackSvar.innerText = "Fel!";
  }
}

// ✅ SPARA BANA
function sparaBana(){
  let blob = new Blob([JSON.stringify(bana)],{type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bana.json";
  a.click();
}
</script>

</body>
</html>
