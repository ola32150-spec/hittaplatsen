<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#bild{
  width:100%;
  max-width:500px;
  margin:20px auto;
  display:block;
}

/* SPEL-LAYOUT */
#spelContainer{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
}

/* INFO */
#infoBox{
  max-width:200px;
  text-align:left;
}

/* KNAPPAR */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  width:90%;
  max-width:300px;
  margin:10px auto;
}

label{
  display:block;
  background:#3498db;
  padding:12px;
  border-radius:10px;
  width:90%;
  max-width:300px;
  margin:10px auto;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:300px;
  margin:10px auto;
  position:relative;
}

video, img{
  width:100%;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:6px 10px;
  border-radius:10px;
}

/* GÖM */
#spelUI,#scan,#fragaRuta{display:none;}

</style>
</head>

<body>

<h2>Kartjakten</h2>

<!-- ✅ ENDAST EN KNAPP -->
<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" accept="image/*" style="display:none;">

<button id="playBtn" onclick="startSpel()">Spela</button>

<!-- ✅ KARTA -->


<!-- SPEL -->
<div id="spelUI">

<div id="spelContainer">

  <img id="spelBild">

  <div id="infoBox">
    <h3>Hitta platsen</h3>
    <p>Gå till rätt plats på kartan.</p>
    <button onclick="visaScan()">Jag är här nu</button>
  </div>

</div>

</div>

<!-- SCAN -->
<div id="scan">
  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay playsinline></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev">
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>

// ✅ DATA
let bana = [{
  bild:null,
  fragaLista:[{fraga:"Testfråga", svar:"test"}]
}];

let steg = 0;
let scanning = false;

let aktuellKontroll = null;
let aktuellFragaIndex = 0;

let bild = document.getElementById("bild");
let spelBild = document.getElementById("spelBild");

/* ✅ STABIL LADDNING */
document.getElementById("kartInput").addEventListener("change", function(e){

  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(ev){

    bild.src = ev.target.result;

    /* ✅ Spara till spelet */
    bana[0].bild = ev.target.result;

    console.log("✅ Kartbild laddad");

  };

  reader.readAsDataURL(file);
});

/* ✅ SPEL START */
function startSpel(){

  if(!bana[0].bild){
    alert("Ladda karta först!");
    return;
  }

  document.querySelector("label").style.display="none";
  playBtn.style.display="none";

  spelUI.style.display="block";

  steg = 0;

  spelBild.src = bana[steg].bild;
}

/* ✅ KNAPP */
function visaScan(){
  spelUI.style.display="none";
  scan.style.display="block";

  referens.src = bana[steg].bild;
}

/* ✅ SCAN */
function startScan(){

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(stream=>{
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
      video.play();
      scanning=true;
      liveScan();
    };
  });
}

/* ✅ LIVE SCAN */
function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,200);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100;
  c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
    }

    let max=100*100*255;
    let p=Math.round((1-diff/max)*100);

    percent.innerText=p+"%";

    if(p>85){

      scanning=false;

      aktuellKontroll=bana[steg];
      aktuellFragaIndex=0;

      visaFraga();
      return;
    }

    setTimeout(liveScan,300);
  };
}

/* ✅ FRÅGA */
function visaFraga(){

  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[0];
  fragaText.innerText=f.fraga;
}

function kollaSvar(){

  steg++;

  if(steg < bana.length){
    fragaRuta.style.display="none";
    spelUI.style.display="block";
  } else {
    alert("🎉 Klar!");
  }
}
</script>

</body>
</html>
