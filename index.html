<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  margin: 0;
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: rgba(0,0,0,0.3);
}

#karta {
  position: relative;
}
#karta img {
  width: 100%;
  border-radius: 10px;
}

.plats {
  position: absolute;
  width: 28px;
  height: 28px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: #2ecc71;
  color: white;
}

#editor, #scan, #fragaRuta {
  display: none;
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
}

video {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="topbar">
  ⭐ <span id="poang">0</span>
  ⏱️ <span id="tid">0</span>s
</div>

<h2>Kartjakten</h2>

<input type="file" id="kartInput">

<button onclick="setMode('edit')">Redigera</button>
<button onclick="setMode('play')">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor">
  <h3>Ny kontroll</h3>

  <p><b>1. Lägg till bild</b></p>
  <input type="file" id="bildInput"><br><br>

  <p><b>2. Skriv fråga</b></p>
  <input id="fragaInput"><br><br>

  <p><b>3. Skriv svar</b></p>
  <input id="svarInput"><br><br>

  <button onclick="spara()">Spara</button>
</div>

<!-- SCAN -->
<div id="scan">
  <h3>📸 Hitta platsen</h3>

  <img id="referens" width="100%"><br><br>

  <video id="video" autoplay></video><br>

  <button onclick="startCamera()">Start kamera</button>
  <button onclick="klarScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElever">
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[], mode="none";
let steg=0, poang=0, tid=0, timer=null;
let tempX=0,tempY=0;

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK → RING */
karta.addEventListener("click", function(e){

  if(mode !== "edit"){
    alert("Tryck på Redigera först");
    return;
  }

  let rect = bild.getBoundingClientRect();
  tempX = e.clientX - rect.left;
  tempY = e.clientY - rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.top=tempY+"px";
  p.style.left=tempX+"px";

  karta.appendChild(p);

  editor.style.display="block";

}, true);

/* MODE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* SPARA */
function spara(){

  if(!bildInput.files[0]){
    alert("Lägg till bild!");
    return;
  }

  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let reader=new FileReader();

  reader.onload=e=>{
    obj.bild=e.target.result;
    bana.push(obj);
  };

  reader.readAsDataURL(bildInput.files[0]);

  editor.style.display="none";
  fragaInput.value="";
  svarInput.value="";
  bildInput.value="";
}

/* SPEL */
function startSpel(){
  steg=0; poang=0; tid=0;

  timer=setInterval(()=>{
    tid++;
    document.getElementById("tid").innerText=tid;
  },1000);

  visaKarta();
}

function visaKarta(){
  referens.src=bana[steg].bild;
  scan.style.display="block";
}

/* ✅ RÄTT KAMERA (BAK-KAMERA) */
function startCamera(){

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { exact: "environment" } }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(() => {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    })
    .then(stream => video.srcObject = stream);
  });
}

/* BILDJÄMFÖRELSE */
function klarScan(){

  if(!video.srcObject){
    alert("Starta kameran först!");
    return;
  }

  let canvas=document.createElement("canvas");
  let ctx=canvas.getContext("2d");

  canvas.width=100;
  canvas.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elevData=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=function(){

    let canvas2=document.createElement("canvas");
    let ctx2=canvas2.getContext("2d");

    canvas2.width=100;
    canvas2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let refData=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elevData.length;i+=4){
      diff += Math.abs(elevData[i]-refData[i]);
      diff += Math.abs(elevData[i+1]-refData[i+1]);
      diff += Math.abs(elevData[i+2]-refData[i+2]);
    }

    let max = 100*100*255*3;
    let procent = Math.round((1 - diff/max)*100);

    if(procent > 95){
      alert("✅ Match ("+procent+"%)");

      scan.style.display="none";
      fragaRuta.style.display="block";
      fragaText.innerText=bana[steg].fraga;

    } else {
      alert("❌ För låg match ("+procent+"%)");
    }
  };
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    poang++;
    document.getElementById("poang").innerText=poang;

    steg++;

    if(steg<bana.length){
      visaKarta();
    } else {
      clearInterval(timer);
      alert("🎉 Klar! Tid: "+tid+" sek");
    }
  } else {
    feedback.innerText="Fel svar";
  }
}
</script>

</body>
</html>
