<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* KARTA */
#karta {
  position: relative;
}
#karta img {
  width: 100%;
}

/* RING */
.plats {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 3px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* ✅ LIKA STORA SCAN-FÖNSTER */
.scanBox {
  position: relative;
  width: 90%;
  max-width: 420px;
  margin: 20px auto;
}

/* MEDIA */
.scanBox img,
.scanBox video {
  width: 100%;
  border-radius: 12px;
  background: black;
  display: block;
}

/* PROCENT */
#percent {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: bold;
}

/* BUTTON */
button {
  width: 90%;
  max-width: 420px;
  padding: 12px;
  margin-top: 10px;
  background: #2ecc71;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

#editor, #scan, #fragaRuta {
  display: none;
}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<input type="file" id="kartInput">
<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor">
  <input type="file" id="bildInput"><br><br>
  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br><br>
  <button onclick="spara()">Spara</button>
</div>

<!-- ✅ SCAN FIXAD -->
<div id="scan">

  <h3>📸 Rikta kameran</h3>

  <!-- REFERENS -->
  <div class="scanBox">
    <img id="referens">
  </div>

  <!-- KAMERA -->
  <div class="scanBox">
    <video id="video" autoplay></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>

</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElever"><br><br>
  <button onclick="svara()">Svara</button>
</div>

<script>
let bana=[], mode="none", tempX, tempY, steg=0, scanning=false;

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* ✅ KLICK FIX */
karta.onclick=e=>{
  if(mode!=="edit")return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";

  karta.appendChild(p);
  editor.style.display="block";
};

/* SPARA */
function spara(){
  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let r=new FileReader();
  r.onload=e=>{
    obj.bild=e.target.result;
    bana.push(obj);
  };

  r.readAsDataURL(bildInput.files[0]);
  editor.style.display="none";
}

/* SPEL */
function startSpel(){
  steg=0;
  referens.src=bana[0].bild;
  scan.style.display="block";
}

/* SCAN START */
function startScan(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    video.srcObject=s;
    scanning=true;
    setTimeout(liveScan,500);
  });
}

/* ✅ STABIL LIVE SCAN */
function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,300);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100;
  c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
      diff+=Math.abs(elev[i+1]-ref[i+1]);
      diff+=Math.abs(elev[i+2]-ref[i+2]);
    }

    let max=100*100*255*3;
    let p=Math.round((1-diff/max)*100);

    percent.innerText=p+"%";

    if(p>90){
      scanning=false;
      alert("✅ Match "+p+"%");
      scan.style.display="none";
      fragaRuta.style.display="block";
      fragaText.innerText=bana[steg].fraga;
      return;
    }

    setTimeout(liveScan,400);
  };
}

/* SVAR */
function svara(){
  steg++;
  if(steg<bana.length){
    referens.src=bana[steg].bild;
    scan.style.display="block";
  } else {
    alert("🎉 Klar!");
  }
}
</script>

</body>
</html>
