<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  margin: 0;
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: rgba(0,0,0,0.3);
}

#karta img {
  width: 100%;
  border-radius: 10px;
}

.plats {
  position: absolute;
  width: 28px;
  height: 28px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: #2ecc71;
  color: white;
}

#editor, #scan, #fragaRuta, #qrBox {
  display: none;
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
}

.larareUI { display: block; }
.elev .larareUI { display: none; }
</style>
</head>

<body>

<div id="topbar">
  ⭐ <span id="poang">0</span>
  ⏱️ <span id="tid">0</span>s
</div>

<h2>Kartjakten</h2>

<!-- LÄRARDEL -->
<div class="larareUI">

  <input type="file" id="kartInput">

  <button onclick="setMode('edit')">Redigera</button>
  <button onclick="setMode('play')">Spela</button>

  <input id="banNamn" placeholder="Banans namn">
  <button onclick="sparaMedNamn()">💾 Spara bana</button>

  <select id="banLista"></select>
  <button onclick="laddaVald()">📂 Ladda bana</button>

  <button onclick="skapaQR()">📱 Visa QR‑kod</button>

</div>

<!-- QR -->
<div id="qrBox">
  <h3>QR‑kod</h3>
  <img id="qrBild">
</div>

<!-- KARTA -->
<div id="karta"><img id="bild"></div>

<!-- EDITOR -->
<div id="editor">
  <input id="fragaInput" placeholder="Fråga"><br>
  <input type="file" id="bildInput"><br>
  <input id="svarInput" placeholder="Svar"><br>
  <button onclick="spara()">Spara kontroll</button>
</div>

<!-- SCAN -->
<div id="scan">
  <h3>Hitta platsen</h3>
  <img id="referens"><br>
  <button onclick="klarScan()">Jag är här</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElever">
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[], mode="none";
let steg=0, poang=0, tid=0, timer=null;
let tempX, tempY;

/* AUTO QR / ELEVLÄGE */
window.onload=function(){

  let params=new URLSearchParams(window.location.search);
  let data=params.get("bana");

  if(data){
    bana=JSON.parse(decodeURIComponent(data));
    document.body.classList.add("elev");

    bana.forEach(k=>{
      let p=document.createElement("div");
      p.className="plats";
      p.style.top=k.top+"px";
      p.style.left=k.left+"px";
      karta.appendChild(p);
    });

    setTimeout(startSpel,500);
  }

  uppdateraLista();
};

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
karta.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  editor.style.display="block";
};

/* MODE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* SPARA */
function spara(){

  let obj={
    top:tempY,left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let f=bildInput.files[0];
  if(f){
    let r=new FileReader();
    r.onload=e=>obj.bild=e.target.result;
    r.readAsDataURL(f);
  }

  bana.push(obj);

  let p=document.createElement("div");
  p.className="plats";
  p.style.top=tempY+"px";
  p.style.left=tempX+"px";
  karta.appendChild(p);

  editor.style.display="none";
}

/* SPEL */
function startSpel(){
  steg=0;poang=0;tid=0;

  timer=setInterval(()=>{
    tid++;
    document.getElementById("tid").innerText=tid;
  },1000);

  visaKarta();
}

function visaKarta(){
  referens.src=bana[steg].bild;
  scan.style.display="block";
}

function klarScan(){
  scan.style.display="none";
  fragaRuta.style.display="block";
  fragaText.innerText=bana[steg].fraga;
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    poang++;
    document.getElementById("poang").innerText=poang;

    steg++;

    if(steg<bana.length){visaKarta();}
    else{
      clearInterval(timer);
      alert("🎉 Klar! Tid: "+tid+" sek");
    }
  } else {
    feedback.innerText="Fel";
  }
}

/* QR */
function skapaQR(){
  let data=encodeURIComponent(JSON.stringify(bana));
  let url=location.origin+location.pathname+"?bana="+data;
  let qr="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+url;

  qrBild.src=qr;
  qrBox.style.display="block";
}

/* SPARA BANOR */
function sparaMedNamn(){
  let namn=banNamn.value;
  let alla=JSON.parse(localStorage.getItem("banor")||"{}");

  alla[namn]=bana;
  localStorage.setItem("banor",JSON.stringify(alla));

  uppdateraLista();
}

/* LISTA */
function uppdateraLista(){
  banLista.innerHTML="";
  let alla=JSON.parse(localStorage.getItem("banor")||"{}");

  Object.keys(alla).forEach(n=>{
    let o=document.createElement("option");
    o.value=n; o.innerText=n;
    banLista.appendChild(o);
  });
}

function laddaVald(){
  let alla=JSON.parse(localStorage.getItem("banor")||"{}");
  bana=alla[banLista.value];

  document.querySelectorAll(".plats").forEach(p=>p.remove());

  bana.forEach(k=>{
    let p=document.createElement("div");
    p.className="plats";
    p.style.top=k.top+"px";
    p.style.left=k.left+"px";
    karta.appendChild(p);
  });
}
</script>

</body>
</html>
