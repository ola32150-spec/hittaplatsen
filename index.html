<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  background-color: #000;
  margin: 0;
}

body {
  font-family: -apple-system, Arial;
  color: white;
  text-align: center;
}

/* TOPBAR */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
}

/* KARTA */
#karta img {
  width: 100%;
}

/* RING */
.plats {
  position: absolute;
  width: 22px;
  height: 22px;
  border: 3px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* ✅ CARD */
.card {
  margin: 25px auto;
  width: 90%;
  max-width: 420px;
}

/* =================== */
/* ✅ KAMERA MED SIKTE */
/* =================== */

.cameraBox {
  position: relative;
}

#video {
  width: 100%;
  border-radius: 12px;
}

/* ✅ SIKTE */
#targetBox {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  transform: translate(-50%, -50%);
  border: 4px solid red;
  border-radius: 10px;
}

/* ✅ PROCENT TEXT */
#percentText {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: bold;
}

/* BUTTON */
button {
  width: 90%;
  max-width: 420px;
  padding: 12px;
  border-radius: 10px;
  background: #2ecc71;
  border: none;
  color: white;
  font-size: 16px;
}

#editor, #scan, #fragaRuta {
  display: none;
}
</style>
</head>

<body>

<div id="topbar">
  ⭐ <span id="poang">0</span>
  ⏱️ <span id="tid">0</span>s
</div>

<h2>Kartjakten</h2>

<input type="file" id="kartInput">

<button onclick="setMode('edit')">Redigera</button>
<button onclick="setMode('play')">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor" class="card">
  <input type="file" id="bildInput"><br><br>
  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br><br>
  <button onclick="spara()">Spara</button>
</div>

<!-- ✅ SCAN -->
<div id="scan">

  <h3>📸 Sikta i rutan</h3>

  <div class="card">
    <img id="referens">
  </div>

  <div class="card cameraBox">

    <video id="video" autoplay></video>

    <!-- ✅ SIKTE -->
    <div id="targetBox"></div>

    <!-- ✅ LIVE PROCENT -->
    <div id="percentText">0%</div>

  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta" class="card">
  <h3 id="fragaText"></h3>
  <input id="svarElever"><br><br>
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[], mode="none";
let steg=0, poang=0, tid=0;
let tempX,tempY;
let scanning=false;

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
karta.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.top=tempY+"px";
  p.style.left=tempX+"px";
  karta.appendChild(p);

  editor.style.display="block";
};

/* MODE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* SPARA */
function spara(){
  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let r=new FileReader();
  r.onload=e=>{
    obj.bild=e.target.result;
    bana.push(obj);
  };

  r.readAsDataURL(bildInput.files[0]);

  editor.style.display="none";
}

/* SPEL */
function startSpel(){
  steg=0;
  visaKarta();
}

/* VISA */
function visaKarta(){
  referens.src=bana[steg].bild;
  scan.style.display="block";
}

/* START CAMERA */
function startScan(){
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment"}
  })
  .then(s=>{
    video.srcObject=s;
    scanning=true;
    liveScan();
  });
}

/* ✅ LIVE SCAN + FÄRG */
function liveScan(){

  if(!scanning) return;

  let canvas=document.createElement("canvas");
  let ctx=canvas.getContext("2d");

  canvas.width=100;
  canvas.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=function(){

    let c2=document.createElement("canvas");
    let x=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    x.drawImage(img,0,0,100,100);
    let ref=x.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff += Math.abs(elev[i]-ref[i]);
      diff += Math.abs(elev[i+1]-ref[i+1]);
      diff += Math.abs(elev[i+2]-ref[i+2]);
    }

    let max=100*100*255*3;
    let p=Math.round((1-diff/max)*100);

    percentText.innerText = p + "%";

    /* ✅ FÄRGER */
    if(p < 70){
      targetBox.style.borderColor="red";
    } else if(p < 90){
      targetBox.style.borderColor="yellow";
    } else {
      targetBox.style.borderColor="lime";
    }

    /* ✅ KLAR */
    if(p > 90){

      scanning=false;

      alert("✅ ScanMatch ("+p+"%)");

      scan.style.display="none";
      fragaRuta.style.display="block";
      fragaText.innerText=bana[steg].fraga;

      return;
    }

    setTimeout(liveScan,400);
  };
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    steg++;
    if(steg<bana.length){
      visaKarta();
    } else {
      alert("🎉 Klar!");
    }
  } else feedback.innerText="Fel!";
}
</script>

</body>
</html>
