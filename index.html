<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* ✅ FIXAD KARTA */
#bildWrapper{
  position: relative;
  width: fit-content;
  margin: 20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

/* RING */
.plats{
  position:absolute;
  width:20px;
  height:20px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

/* KNAPPAR */
label{
  display:block;
  background:#3498db;
  margin:10px auto;
  padding:12px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

button{
  width:90%;
  max-width:400px;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:420px;
  margin:20px auto;
  position:relative;
}

.scanBox img,
.scanBox video{
  width:100%;
  border-radius:12px;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

/* VISNING */
#editor,#scan,#fragaRuta{display:none;}

#preview{
  width:200px;
  margin:10px auto;
  display:none;
}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<p id="antal">Kontroller: 0</p>

<!-- EDITOR -->
<div id="editor">

  <label for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" hidden>

  <img id="preview">

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br>

  <button onclick="sparaPunkt()">Spara punkt</button>
  <button onclick="laggTillFraga()">➕ Lägg till fråga</button>

</div>

<!-- SCAN -->
<div id="scan">

  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev"><br><br>
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[];
let mode="none";
let tempX,tempY;

let referensBild=null;
let aktuellPunktIndex=null;

let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* REFERENSBILD */
bildInput.onchange=e=>{
  let file=e.target.files[0];
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(file);
};

/* ✅ FIXAD KLICK – EXAKT POSITION */
bild.onclick = e => {

  if(mode !== "edit") return;

  let rect = bild.getBoundingClientRect();

  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  tempX = x;
  tempY = y;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=x+"px";
  p.style.top=y+"px";

  /* ✅ FÄST PÅ RÄTT STÄLLE */
  document.getElementById("bildWrapper").appendChild(p);

  aktuellPunktIndex=null;
  editor.style.display="block";
};
