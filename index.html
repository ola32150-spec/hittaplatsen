<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#bildWrapper{
  position:relative;
  width:fit-content;
  margin:20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

/* PUNKTER */
.plats{
  position:absolute;
  width:26px;
  height:26px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
}

/* LISTA */
.rad{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.thumb{
  width:80px;
  border-radius:8px;
}

#fragaLista{
  width:90%;
  max-width:400px;
  margin:20px auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:420px;
  margin:20px auto;
}

video, .scanBox img{
  width:100%;
  border-radius:12px;
}

#editor,#scan,#fragaRuta{display:none;}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label id="kartLabel" for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<p id="antal">Punkter: 0</p>

<!-- EDIT -->
<div id="editor">
  <label id="bildLabel" for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" hidden>
  <img id="preview">

  <input id="fragaInput" placeholder="Fråga">
  <input id="svarInput" placeholder="Svar">

  <button onclick="sparaPunkt()">Spara punkt</button>
  <button onclick="laggTillFraga()">➕ Lägg till fråga</button>
</div>

<div id="fragaLista"></div>

<!-- ✅ SCAN (tillbaka) -->
<div id="scan">
  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay playsinline></video>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev">
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[];
let mode="none";
let tempX,tempY;

let aktuellPunktIndex=null;
let referensBild=null;

let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

let kartInput=document.getElementById("kartInput");
let bild=document.getElementById("bild");

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* REFERENS */
bildInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
bild.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";
  p.innerText=bana.length+1;

  bildWrapper.appendChild(p);

  editor.style.display="block";
};

/* LISTA */
function visaFragaLista(){

  let html="";

  bana.forEach((punkt,index)=>{

    html+="<h3>Punkt "+(index+1)+"</h3>";
    html+="<div class='rad'>";

    html+="<div>";

    punkt.fragaLista.forEach((f,i)=>{
      html+="<p>"+(i+1)+". "+f.fraga+"</p>";
    });

    html+="</div>";

    if(punkt.bild){
      html+="<img src='"+punkt.bild+"' class='thumb'>";
    }

    html+="</div><hr>";
  });

  fragaLista.innerHTML=html;
}

/* SPARA */
function sparaPunkt(){

  let obj={
    top:tempX,
    left:tempY,
    bild:referensBild,
    fragaLista:[{fraga:fragaInput.value,svar:svarInput.value}]
  };

  bana.push(obj);
  aktuellPunktIndex=bana.length-1;

  antal.innerText="Punkter: "+bana.length;

  visaFragaLista();
}

/* LÄGG TILL */
function laggTillFraga(){

  if(aktuellPunktIndex===null) return;

  bana[aktuellPunktIndex].fragaLista.push({
    fraga:fragaInput.value,
    svar:svarInput.value
  });

  visaFragaLista();
}

/* ✅ SPEL FAKTISKT FUNKAR NU */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först");
    return;
  }

  mode="play";

  editor.style.display="none";
  fragaLista.style.display="none";
  kartLabel.style.display="none";

  steg=0;

  referens.src=bana[0].bild;

  scan.style.display="block";
}

/* ✅ KAMERA */
function startScan(){

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(s=>{
    video.srcObject=s;
  });
}

/* ✅ FRÅGOR */
function visaFraga(){

  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];
  fragaText.innerText=f.fraga;
}

</script>

</body>
</html>
