<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<tile>Kartjakten</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  margin: 0;
  text-align: center;
}

/* TOPBAR */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: rgba(0,0,0,0.3);
}

/* KARTA */
#kartaWrapper { width: 100%; }
#karta img { width: 100%; border-radius: 10px; }

.plats {
  position: absolute;
  width: 28px;
  height: 28px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* UI */
button {
  width: 100%;
  padding: 15px;
  margin-top: 8px;
  border-radius: 12px;
  font-size: 18px;
  border: none;
  background: #2ecc71;
  color: white;
}

button.secondary { background: #3498db; }

#scan, #fragaRuta {
  display: none;
  background: white;
  color: black;
  border-radius: 16px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  margin: 15px auto;
}

/* LÄRARE */
.larareUI { display: block; }
.elev .larareUI { display: none; }

video { width: 100%; border-radius: 10px; }

/* QR BOX */
#qrBox {
  display:none;
  background:white;
  color:black;
  padding:15px;
  margin:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="topbar">
  <div>⭐ <span id="poang">0</span></div>
  <div>⏱️ <span id="tid">0</span>s</div>
</div>

<h2>🗺️ Kartjakten</h2>

<!-- LÄRARDEL -->
<div class="larareUI">
  <input type="file" id="kartInput"><br>

  <button onclick="setMode('edit')">Redigera</button>
  <button onclick="setMode('play')">Spela</button>

  <button onclick="sparaBana()">💾 Spara</button>

  <!-- ✅ QR KNAPP -->
  <button onclick="skapaQR()">📱 Visa QR‑kod</button>
</div>

<!-- ✅ QR VISNING -->
<div id="qrBox">
  <h3>QR‑kod för elever</h3>
  <img id="qrBild" width="220">
</div>

<!-- KARTA -->
<div id="kartaWrapper">
  <div id="karta">
    <img id="bild">
  </div>
</div>

<!-- EDITOR -->
<div id="editor" class="larareUI" style="display:none;">
  <input id="fragaInput" placeholder="Fråga"><br>
  <input type="file" id="bildInput"><br>
  <input id="svarInput" placeholder="Svar"><br>
  <button onclick="spara()">Spara kontroll</button>
</div>

<!-- SCAN -->
<div id="scan">
  <h2>📸 Gå till platsen</h2>
  <img id="referens"><br>
  <video id="video" autoplay></video>
  <button class="secondary" onclick="startCamera()">Start kamera</button>
  <button onclick="klarScan()">✅ Jag är här</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h2 id="fragaText"></h2>
  <input id="svarElever">
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[];
let mode="none";
let steg=0, poang=0, tid=0, timer=null;
let tempX, tempY;

/* AUTO QR / ELEVLÄGE */
window.onload=function(){
  let params=new URLSearchParams(window.location.search);
  let data=params.get("bana");

  if(data){
    bana=JSON.parse(decodeURIComponent(data));
    document.body.classList.add("elev");

    bana.forEach(k=>{
      let p=document.createElement("div");
      p.className="plats";
      p.style.top=k.top+"px";
      p.style.left=k.left+"px";
      karta.appendChild(p);
    });

    setTimeout(startSpel,800);
  }
};

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
karta.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  editor.style.display="block";
};

/* MODE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* SPARA */
function spara(){
  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let f=bildInput.files[0];
  if(f){
    let r=new FileReader();
    r.onload=e=>obj.bild=e.target.result;
    r.readAsDataURL(f);
  }

  bana.push(obj);

  let p=document.createElement("div");
  p.className="plats";
  p.style.top=tempY+"px";
  p.style.left=tempX+"px";
  karta.appendChild(p);

  editor.style.display="none";
}

/* SPEL */
function startSpel(){
  steg=0;poang=0;tid=0;

  timer=setInterval(()=>{
    tid++;
    document.getElementById("tid").innerText=tid;
  },1000);

  visaKarta();
}

/* VISA */
function visaKarta(){
  let k=bana[steg];
  let p=document.querySelector(".plats");

  p.style.top=k.top+"px";
  p.style.left=k.left+"px";

  referens.src=k.bild;
  scan.style.display="block";
}

/* KAMERA */
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
    .then(s=>video.srcObject=s);
}

/* SCAN */
function klarScan(){
  scan.style.display="none";
  fragaRuta.style.display="block";
  fragaText.innerText=bana[steg].fraga;
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    poang++;
    document.getElementById("poang").innerText=poang;

    steg++;
    if(steg<bana.length){visaKarta();}
    else{
      clearInterval(timer);
      alert("🎉 Klar! Tid: "+tid+" sek");
    }
  } else {
    feedback.innerText="Fel!";
  }
}

/* SPARA FIL */
function sparaBana(){
  let blob=new Blob([JSON.stringify(bana)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="bana.json";
  a.click();
}

/* ✅ QR DIREKT */
function skapaQR(){

  if(bana.length===0){
    alert("Skapa bana först!");
    return;
  }

  let data=encodeURIComponent(JSON.stringify(bana));

  let url=window.location.origin +
          window.location.pathname +
          "?bana=" + data;

  let qr="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+url;

  document.getElementById("qrBild").src=qr;
  document.getElementById("qrBox").style.display="block";
}
</script>

</body>
</html>
