<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* 🔥 SPEL-LÄGE – döljer edit */
.play #editor,
.play label,
.play #editBtn {
  display:none !important;
}

/* KARTA */
#bildWrapper{
  position:relative;
  width:fit-content;
  margin:20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

.plats{
  position:absolute;
  width:20px;
  height:20px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

/* KNAPPAR */
label{
  display:block;
  background:#3498db;
  margin:10px auto;
  padding:12px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

button{
  width:90%;
  max-width:400px;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:420px;
  margin:20px auto;
  position:relative;
}

.scanBox img,
.scanBox video{
  width:100%;
  border-radius:12px;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

/* VISNING */
#editor,#scan,#fragaRuta{display:none;}

#preview{
  width:200px;
  margin:10px auto;
  display:none;
}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button id="editBtn" onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<p id="antal">Kontroller: 0</p>

<!-- EDITOR -->
<div id="editor">

  <label for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" hidden>

  <img id="preview">

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br>

  <button onclick="sparaPunkt()">Spara punkt</button>
  <button onclick="laggTillFraga()">➕ Lägg till fråga</button>

</div>

<!-- SCAN -->
<div id="scan">

  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev"><br><br>
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[];
let mode="none";
let tempX,tempY;

let referensBild=null;
let aktuellPunktIndex=null;

let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

/* ELEMENT */
let kartInput = document.getElementById("kartInput");
let bild = document.getElementById("bild");

/* LADDA KARTA */
kartInput.onchange = function(e){
  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();
  reader.onload = ev => bild.src = ev.target.result;
  reader.readAsDataURL(file);
};

/* REFERENSBILD */
bildInput.onchange = e => {
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK KARTA */
bild.onclick = e => {

  if(mode !== "edit") return;

  let rect = bild.getBoundingClientRect();

  tempX = e.clientX - rect.left;
  tempY = e.clientY - rect.top;

  let p = document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";

  document.getElementById("bildWrapper").appendChild(p);

  aktuellPunktIndex=null;
  editor.style.display="block";
};

/* SKAPA PUNKT */
function sparaPunkt(){

  if(!referensBild){
    alert("Välj bild först");
    return;
  }

  if(!fragaInput.value || !svarInput.value){
    alert("Skriv fråga och svar");
    return;
  }

  let obj={
    top:tempX,
    left:tempY,
    bild:referensBild,
    fragaLista:[{fraga:fragaInput.value,svar:svarInput.value}]
  };

  bana.push(obj);
  aktuellPunktIndex=bana.length-1;

  antal.innerText="Kontroller: "+bana.length;

  fragaInput.value="";
  svarInput.value="";
}

/* LÄGG TILL FRÅGA */
function laggTillFraga(){

  if(aktuellPunktIndex===null){
    alert("Skapa punkt först");
    return;
  }

  let punkt=bana[aktuellPunktIndex];

  punkt.fragaLista.push({
    fraga:fragaInput.value,
    svar:svarInput.value
  });

  fragaInput.value="";
  svarInput.value="";
}

/* ✅ SPEL */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först!");
    return;
  }

  mode="play";
  document.body.classList.add("play");

  editor.style.display="none";

  steg=0;
  referens.src=bana[0].bild;

  scan.style.display="block";
}

/* SCAN */
function startScan(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    video.srcObject=s;
    scanning=true;
    liveScan();
  });
}

function liveScan(){

  if(!scanning) return;

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");
  c.width=100; c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");
    c2.width=100; c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;
    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
      diff+=Math.abs(elev[i+1]-ref[i+1]);
      diff+=Math.abs(elev[i+2]-ref[i+2]);
    }

    let max=100*100*255*3;
    let p=Math.round((1-diff/max)*100);
    percent.innerText=p+"%";

    if(p>85){
      scanning=false;
      aktuellKontroll=bana[steg];
      aktuellFragaIndex=0;
      visaFraga();
      return;
    }

    setTimeout(liveScan,400);
  };
}

/* FRÅGOR */
function visaFraga(){
  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];
  fragaText.innerText=f.fraga;
}

function kollaSvar(){

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];

  if(svarElev.value.toLowerCase()===f.svar.toLowerCase()){

    aktuellFragaIndex++;

    if(aktuellFragaIndex < aktuellKontroll.fragaLista.length){
      visaFraga();
    } else {
      steg++;
      if(steg<bana.length){
        referens.src=bana[steg].bild;
        fragaRuta.style.display="none";
        scan.style.display="block";
        scanning=true;
        liveScan();
      } else {
        alert("🎉 Klar!");
      }
    }

  } else {
    alert("❌ Fel svar");
  }

  svarElev.value="";
}
</script>

</body>
</html>
