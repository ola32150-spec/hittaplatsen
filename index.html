<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#bildWrapper{
  position:relative;
  width:fit-content;
  margin:20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

/* PUNKTER */
.plats{
  position:absolute;
  width:26px;
  height:26px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
}

/* ✅ MOBIL EDITOR */
#editor{
  width:95%;
  max-width:500px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* INPUTS */
input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

/* BUTTON + LABEL */
button, label{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  margin:5px auto;
}

label{ background:#3498db; }
button{ background:#2ecc71; border:none; }

/* PREVIEW */
#preview{
  width:100%;
  max-width:250px;
  margin:10px auto;
  border-radius:12px;
  display:none;
}

/* LISTA */
#fragaLista{
  width:95%;
  max-width:500px;
  margin:20px auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

.rad{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.thumb{
  width:80px;
  border-radius:8px;
}

.rad p{
  margin:4px 0;
}

/* SCAN */
.scanBox{
  width:95%;
  max-width:420px;
  margin:20px auto;
}

.scanBox img,
.scanBox video{
  width:100%;
  border-radius:12px;
}

/* VISNING */
#editor,#scan,#fragaRuta{display:none;}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label id="kartLabel" for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<p id="antal">Punkter: 0</p>

<!-- EDITOR -->
<div id="editor">

<label id="bildLabel" for="bildInput">📷 Skapa referensbild</label>
<input type="file" id="bildInput" hidden>

<img id="preview">

<input id="fragaInput" placeholder="Fråga">
<input id="svarInput" placeholder="Svar">

<button onclick="sparaPunkt()">Spara punkt</button>
<button onclick="laggTillFraga()">➕ Lägg till fråga</button>

</div>

<div id="fragaLista"></div>

<!-- SCAN -->
<div id="scan">
  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay playsinline></video>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<script>
let bana=[];
let mode="none";
let tempX,tempY;

let aktuellPunktIndex=null;
let referensBild=null;

let steg=0;

let kartInput=document.getElementById("kartInput");
let bild=document.getElementById("bild");

/* LABEL */
function uppdateraBildLabel(){
  let text="📷 Skapa referensbild";
  if(aktuellPunktIndex===null){
    text+=" till punkt "+(bana.length+1);
  } else {
    text+=" till punkt "+(aktuellPunktIndex+1);
  }
  bildLabel.innerText=text;
}

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* REFERENS */
bildInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
bild.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";
  p.innerText=bana.length+1;

  bildWrapper.appendChild(p);

  editor.style.display="block";
  aktuellPunktIndex=null;

  uppdateraBildLabel();
};

/* LISTA */
function visaFragaLista(){

  let html="";

  bana.forEach((punkt,index)=>{

    html+="<h3>Punkt "+(index+1)+"</h3>";
    html+="<div class='rad'>";

    html+="<div>";
    punkt.fragaLista.forEach((f,i)=>{
      html+="<p>"+(i+1)+". "+f.fraga+"</p>";
    });
    html+="</div>";

    if(punkt.bild){
      html+="<img src='"+punkt.bild+"' class='thumb'>";
    }

    html+="</div><hr>";
  });

  fragaLista.innerHTML=html;
}

/* SPARA */
function sparaPunkt(){

  let obj={
    top:tempX,
    left:tempY,
    bild:referensBild,
    fragaLista:[{fraga:fragaInput.value,svar:svarInput.value}]
  };

  bana.push(obj);
  aktuellPunktIndex=bana.length-1;

  antal.innerText="Punkter: "+bana.length;

  fragaInput.value="";
  svarInput.value="";

  visaFragaLista();
  uppdateraBildLabel();
}

/* LÄGG TILL */
function laggTillFraga(){

  if(aktuellPunktIndex===null){
    alert("Skapa punkt först");
    return;
  }

  bana[aktuellPunktIndex].fragaLista.push({
    fraga:fragaInput.value,
    svar:svarInput.value
  });

  fragaInput.value="";
  svarInput.value="";

  visaFragaLista();
}

/* SPEL */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först");
    return;
  }

  mode="play";

  editor.style.display="none";
  fragaLista.style.display="none";
  kartLabel.style.display="none";

  steg=0;

  referens.src=bana[0].bild;
  scan.style.display="block";
}

/* KAMERA */
function startScan(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(s=>{
    video.srcObject=s;
  })
  .catch(()=>{
    alert("Tillåt kamera");
  });
}
</script>

</body>
</html>
