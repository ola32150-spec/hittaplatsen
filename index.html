<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#karta{position:relative;}
#karta img{
  width:90%;
  max-width:500px;
  margin:20px auto;
  display:block;
}

/* RING */
.plats{
  position:absolute;
  width:20px;
  height:20px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

/* LABEL */
label{
  display:block;
  background:#3498db;
  margin:10px auto;
  padding:12px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:420px;
  margin:20px auto;
  position:relative;
}

.scanBox img,
.scanBox video{
  width:100%;
  border-radius:12px;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

/* BUTTON */
button{
  width:90%;
  max-width:400px;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
}

/* PREVIEW */
#preview{
  width:90%;
  max-width:200px;
  margin:10px auto;
  display:none;
  border-radius:10px;
}

#editor,#scan{display:none;}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor">

  <label for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" hidden>

  <!-- ✅ NY PREVIEW -->
  <img id="preview">

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br><br>

  <button onclick="spara()">Spara kontroll</button>
</div>

<!-- SCAN -->
<div id="scan">

  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<script>
let bana=[],mode="none",tempX,tempY;
let referensBild=null;

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* ✅ VIKTIGT: LADDA REFERENS DIREKT */
bildInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file) return;

  let reader=new FileReader();
  reader.onload=function(ev){

    referensBild = ev.target.result;

    preview.src = referensBild;
    preview.style.display="block";

    console.log("✅ Bild redo");
  };
  reader.readAsDataURL(file);
};

/* KLICK */
karta.onclick=e=>{
  if(mode!=="edit")return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";
  karta.appendChild(p);

  editor.style.display="block";
};

/* ✅ SPARA (NU FUNKAR ALLTID) */
function spara(){

  if(!referensBild){
    alert("❗ Välj bild först");
    return;
  }

  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:referensBild
  };

  bana.push(obj);

  console.log("✅ Sparad:", obj);

  editor.style.display="none";

  preview.style.display="none";
  referensBild=null;

  fragaInput.value="";
  svarInput.value="";
}

/* SPEL */
function startSpel(){
  if(bana.length===0){
    alert("Ingen bana skapad!");
    return;
  }
  referens.src=bana[0].bild;
  scan.style.display="block";
}

/* SCAN */
function startScan(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    video.srcObject=s;
    liveScan();
  });
}

function liveScan(){

  if(!video.videoWidth){
    setTimeout(liveScan,300);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100; c.height=100;
  ctx.drawImage(video,0,0,100,100);

  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100; c2.height=100;
    ctx2.drawImage(img,0,0,100,100);

    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;
    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
      diff+=Math.abs(elev[i+1]-ref[i+1]);
      diff+=Math.abs(elev[i+2]-ref[i+2]);
    }

    let max=100*100*255*3;
    let p=Math.round((1-diff/max)*100);
    percent.innerText=p+"%";

    if(p>85){
      alert("✅ Match!");
      return;
    }

    setTimeout(liveScan,400);
  };
}
</script>

</body>
</html>
