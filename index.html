<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#bildWrapper{
  position:relative;
  width:fit-content;
  margin:20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

/* PUNKTER */
.plats{
  position:absolute;
  width:26px;
  height:26px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
}

/* EDITOR */
#editor{
  width:95%;
  max-width:500px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:none;
}

button, label{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
}

label{ background:#3498db; }
button{ background:#2ecc71; border:none; }

/* PREVIEW */
#preview{
  width:100%;
  max-width:250px;
  display:none;
  margin:10px auto;
}

/* LISTA */
#fragaLista{
  width:95%;
  max-width:500px;
  margin:20px auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

.rad{
  display:flex;
  justify-content:space-between;
}

.thumb{
  width:80px;
  border-radius:8px;
}

/* SCAN */
.scanBox{
  width:95%;
  max-width:420px;
  margin:20px auto;
  position:relative;
}

.scanBox video,
.scanBox img{
  width:100%;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  background:rgba(0,0,0,0.6);
  padding:6px 12px;
  border-radius:10px;
}

#editor,#scan,#fragaRuta{display:none;}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button onclick="mode='edit'">Redigera</button>
<button onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<p id="antal">Punkter: 0</p>

<!-- EDITOR -->
<div id="editor">

<label for="bildInput">📷 Skapa referensbild</label>
<input type="file" id="bildInput" hidden>

<img id="preview">

<input id="fragaInput" placeholder="Fråga">
<input id="svarInput" placeholder="Svar">

<button onclick="sparaPunkt()">Spara punkt</button>
<button onclick="laggTillFraga()">➕ Lägg till fråga</button>

</div>

<div id="fragaLista"></div>

<!-- SCAN -->
<div id="scan">

<div class="scanBox">
  <img id="referens">
</div>

<div class="scanBox">
  <video id="video" autoplay playsinline></video>
  <div id="percent">0%</div>
</div>

<button onclick="startScan()">Scanna</button>

</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev">
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[], mode="none";
let tempX,tempY;

let referensBild=null;
let aktuellPunktIndex=null;

let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

/* KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* REFERENS */
bildInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
bild.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";
  p.innerText=bana.length+1;

  bildWrapper.appendChild(p);

  editor.style.display="block";
};

/* SPARA */
function sparaPunkt(){

  bana.push({
    bild:referensBild,
    fragaLista:[{
      fraga:fragaInput.value,
      svar:svarInput.value
    }]
  });

  aktuellPunktIndex=bana.length-1;
  antal.innerText="Punkter: "+bana.length;

  visaFragaLista();
}

/* LÄGG TILL */
function laggTillFraga(){

  if(aktuellPunktIndex===null) return;

  bana[aktuellPunktIndex].fragaLista.push({
    fraga:fragaInput.value,
    svar:svarInput.value
  });

  visaFragaLista();
}

/* LISTA */
function visaFragaLista(){

  let html="";

  bana.forEach((punkt,i)=>{

    html+="<h3>Punkt "+(i+1)+"</h3>";
    html+="<div class='rad'><div>";

    punkt.fragaLista.forEach((f,j)=>{
      html+="<p>"+(j+1)+". "+f.fraga+"</p>";
    });

    html+="</div>";

    if(punkt.bild){
      html+="<img src='"+punkt.bild+"' class='thumb'>";
    }

    html+="</div><hr>";
  });

  fragaLista.innerHTML=html;
}

/* SPEL */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först!");
    return;
  }

  mode="play";

  editor.style.display="none";
  fragaLista.style.display="none";

  steg=0;

  referens.src=bana[0].bild;

  scan.style.display="block";
}

/* SCAN */
function startScan(){

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(stream=>{
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
      video.play();
      scanning=true;
      liveScan();
    };
  });
}

/* ✅ LIVE SCAN */
function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,200);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100;
  c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
    }

    let max=100*100*255;
    let p=Math.round((1-diff/max)*100);

    percent.innerText=p+"%";

    if(p>85){

      scanning=false;

      aktuellKontroll=bana[steg];
      aktuellFragaIndex=0;

      visaFraga();
      return;
    }

    setTimeout(liveScan,300);
  };
}

/* ✅ VISA FRÅGA */
function visaFraga(){

  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];
  fragaText.innerText="Punkt "+(steg+1)+": "+f.fraga;
}

/* ✅ SVAR */
function kollaSvar(){

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];

  if(svarElev.value.toLowerCase() === f.svar.toLowerCase()){

    aktuellFragaIndex++;

    if(aktuellFragaIndex < aktuellKontroll.fragaLista.length){
      visaFraga();
    }
    else{

      steg++;

      if(steg < bana.length){

        referens.src=bana[steg].bild;

        fragaRuta.style.display="none";
        scan.style.display="block";

        scanning=true;
        liveScan();

      } else {
        alert("🎉 Klar!");
      }
    }

  } else {
    alert("❌ Fel svar");
  }

  svarElev.value="";
}
</script>

</body>
</html>
