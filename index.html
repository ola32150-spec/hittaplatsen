<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* ✅ KARTA MINDRE */
#karta {
  position: relative;
}

#karta img {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  display: block;
  border-radius: 12px;
}

/* RING */
.plats {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 3px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* LABEL SOM KNAPP */
label {
  display: block;
  width: 90%;
  max-width: 420px;
  margin: 10px auto;
  padding: 12px;
  background: #3498db;
  border-radius: 10px;
  cursor: pointer;
}

/* SCAN */
.scanBox {
  position: relative;
  width: 90%;
  max-width: 420px;
  margin: 20px auto;
}

.scanBox img,
.scanBox video {
  width: 100%;
  border-radius: 12px;
  background: black;
}

/* PROCENT */
#percent {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: bold;
}

/* BUTTON */
button {
  width: 90%;
  max-width: 420px;
  padding: 12px;
  margin-top: 10px;
  background: #2ecc71;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

/* DÖLJ */
#editor, #scan {
  display: none;
}

/* ELEV-LÄGE */
.elev #kartInput,
.elev #editBtn,
.elev #editor {
  display: none !important;
}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<!-- ✅ NY KNAPP -->
<label for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" style="display:none;">

<button id="editBtn" onclick="mode='edit'">Redigera</button>
<button onclick="startElev()">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor">

  <label for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" style="display:none;"><br><br>

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br><br>

  <button onclick="spara()">Spara kontroll</button>
</div>

<!-- SCAN -->
<div id="scan">

  <h3>📸 Rikta kameran</h3>

  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>

</div>

<script>
let bana=[], mode="none";
let tempX,tempY;
let steg=0;
let scanning=false;

let bildInput = document.getElementById("bildInput");

/* START */
window.onload = function(){

  let params = new URLSearchParams(window.location.search);

  if(params.get("elev") === "1"){
    document.body.classList.add("elev");
  }

  let data = params.get("bana");
  if(data){
    bana = JSON.parse(decodeURIComponent(data));
    startSpel();
  }
};

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
karta.onclick=e=>{
  if(mode!=="edit")return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";

  karta.appendChild(p);
  editor.style.display="block";
};

/* ✅ FIXAD SPARA */
function spara(){

  if(!bildInput.files || !bildInput.files[0]){
    alert("❗ Välj en referensbild först");
    return;
  }

  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let reader=new FileReader();

  reader.onload=function(e){
    obj.bild = e.target.result;

    bana.push(obj);

    console.log("✅ Sparad kontroll", obj);
  };

  reader.readAsDataURL(bildInput.files[0]);

  editor.style.display="none";

  fragaInput.value="";
  svarInput.value="";
  bildInput.value="";
}

/* START ELEV */
function startElev(){
  let data = encodeURIComponent(JSON.stringify(bana));
  window.location.href = "?elev=1&bana=" + data;
}

/* SPEL */
function startSpel(){
  steg=0;
  referens.src=bana[0].bild;
  scan.style.display="block";
}

/* SCAN */
function startScan(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    video.srcObject=s;
    scanning=true;
    setTimeout(liveScan,500);
  });
}

/* MATCH */
function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,300);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100;
  c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
      diff+=Math.abs(elev[i+1]-ref[i+1]);
      diff+=Math.abs(elev[i+2]-ref[i+2]);
    }

    let max=100*100*255*3;
    let p=Math.round((1-diff/max)*100);

    percent.innerText=p+"%";

    if(p>85){

      scanning=false;

      let data = encodeURIComponent(JSON.stringify(bana[steg]));
      window.location.href = "./fraga.html?data=" + data;

      return;
    }

    setTimeout(liveScan,400);
  };
}
</script>

</body>
</html>
