<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* KARTA */
#bildWrapper{
  position:relative;
  width:fit-content;
  margin:20px auto;
}

#bild{
  display:block;
  width:100%;
  max-width:500px;
}

/* NUMRERADE PUNKTER */
.plats{
  position:absolute;
  width:26px;
  height:26px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
}

/* KNAPPAR */
label, button{
  display:block;
  margin:10px auto;
  width:90%;
  max-width:400px;
  padding:12px;
  border-radius:10px;
}

label{ background:#3498db; }
button{ background:#2ecc71; border:none; }

/* SCAN */
.scanBox{
  width:90%;
  max-width:420px;
  margin:20px auto;
  position:relative;
}

.scanBox img,
.scanBox video{
  width:100%;
  border-radius:12px;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
}

/* LISTA */
#fragaLista{
  width:90%;
  max-width:400px;
  margin:20px auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

#editor,#scan,#fragaRuta{display:none;}

#preview{
  width:200px;
  display:none;
  margin:10px auto;
}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<label id="kartLabel" for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button id="editBtn" onclick="mode='edit'">Redigera</button>
<button id="playBtn" onclick="startSpel()">Spela</button>

<div id="bildWrapper">
  <img id="bild">
</div>

<!-- ✅ ÄNDRAD TEXT -->
<p id="antal">Punkter: 0</p>

<!-- EDITOR -->
<div id="editor">

  <label id="bildLabel" for="bildInput">📷 Skapa referensbild</label>
  <input type="file" id="bildInput" hidden>

  <img id="preview">

  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br>

  <button onclick="sparaPunkt()">Spara punkt</button>
  <button onclick="laggTillFraga()">➕ Lägg till fråga</button>

</div>

<div id="fragaLista"></div>

<!-- SCAN -->
<div id="scan">
  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay playsinline></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev"><br><br>
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[], mode="none";
let tempX,tempY;

let referensBild=null;
let aktuellPunktIndex=null;

let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

let kartInput=document.getElementById("kartInput");
let bild=document.getElementById("bild");

/* LABEL */
function uppdateraBildLabel(){
  let text="📷 Skapa referensbild";
  if(aktuellPunktIndex===null){
    text+=" till punkt "+(bana.length+1);
  } else {
    text+=" till punkt "+(aktuellPunktIndex+1);
  }
  bildLabel.innerText=text;
}

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* REFERENS */
bildInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    referensBild=ev.target.result;
    preview.src=referensBild;
    preview.style.display="block";
  };
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
bild.onclick=e=>{
  if(mode!=="edit") return;

  let rect=bild.getBoundingClientRect();
  tempX=e.clientX-rect.left;
  tempY=e.clientY-rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.left=tempX+"px";
  p.style.top=tempY+"px";
  p.innerText=bana.length+1;

  bildWrapper.appendChild(p);

  aktuellPunktIndex=null;
  editor.style.display="block";
  fragaLista.innerHTML="";

  uppdateraBildLabel();
};

/* LISTA */
function visaFragaLista(){
  if(aktuellPunktIndex===null) return;

  let punkt=bana[aktuellPunktIndex];
  let html="<h3>Punkt "+(aktuellPunktIndex+1)+"</h3>";

  punkt.fragaLista.forEach((f,i)=>{
    html+="<p>"+(i+1)+". "+f.fraga+"</p>";
  });

  fragaLista.innerHTML=html;
}

/* SPARA */
function sparaPunkt(){

  let obj={
    top:tempX,
    left:tempY,
    bild:referensBild,
    fragaLista:[{fraga:fragaInput.value,svar:svarInput.value}]
  };

  bana.push(obj);
  aktuellPunktIndex=bana.length-1;

  /* ✅ ÄNDRAD TEXT */
  antal.innerText="Punkter: "+bana.length;

  fragaInput.value="";
  svarInput.value="";

  visaFragaLista();
  uppdateraBildLabel();
}

/* LÄGG TILL */
function laggTillFraga(){

  if(aktuellPunktIndex===null){
    alert("Skapa punkt först");
    return;
  }

  bana[aktuellPunktIndex].fragaLista.push({
    fraga:fragaInput.value,
    svar:svarInput.value
  });

  fragaInput.value="";
  svarInput.value="";

  visaFragaLista();
}

/* SPEL */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först!");
    return;
  }

  mode="play";

  editor.style.display="none";
  kartLabel.style.display="none";
  editBtn.style.display="none";
  playBtn.style.display="none";
  fragaLista.style.display="none";

  steg=0;
  referens.src=bana[0].bild;

  scan.style.display="block";
}

/* SCAN */
function startScan(){

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  })
  .then(stream=>{
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
      video.play();
      scanning=true;
      liveScan();
    };
  })
  .catch(()=>{
    alert("Tillåt kamera för att scanna");
  });
}

/* FRÅGOR */
function visaFraga(){
  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[aktuellFragaIndex];
  fragaText.innerText="Punkt "+(steg+1)+": "+f.fraga;
}
</script>

</body>
</html>
