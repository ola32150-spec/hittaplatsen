<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* SPEL-LAYOUT */
#spelContainer{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
}

#bildWrapper{
  position:relative;
}

#bild{
  width:100%;
  max-width:500px;
}

.plats{
  position:absolute;
  width:26px;
  height:26px;
  border:3px solid red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

/* INFO */
#infoBox{
  max-width:200px;
  text-align:left;
}

/* KNAPPAR */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  width:100%;
  margin-top:10px;
}

label{
  display:block;
  background:#3498db;
  padding:12px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  margin:10px auto;
}

/* SCAN */
.scanBox{
  width:90%;
  max-width:300px;
  margin:10px auto;
  position:relative;
}

video, img{
  width:100%;
}

#percent{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:6px 10px;
  border-radius:10px;
}

/* GÖM */
#editor,#scan,#fragaRuta,#spelUI{display:none;}
</style>
</head>

<body>

<h2>Kartjakten</h2>

<!-- ✅ NY: LADDNING AV KARTA -->
<label id="kartLabel" for="kartInput">📍 Ladda upp karta</label>
<input type="file" id="kartInput" hidden>

<button id="editBtn" onclick="mode='edit'">Redigera</button>
<button id="playBtn" onclick="startSpel()">Spela</button>

<!-- SPEL -->
<div id="spelUI">

<div id="spelContainer">

  <div id="bildWrapper">
    <img id="bild">
  </div>

  <!-- INFO -->
  <div id="infoBox">
    <h3>Hitta platsen</h3>
    <p>Gå till rätt plats på kartan.</p>

    <button onclick="visaScan()">Jag är här nu</button>
  </div>

</div>

</div>

<p id="antal">Punkter: 0</p>

<!-- SCAN -->
<div id="scan">
  <div class="scanBox">
    <img id="referens">
  </div>

  <div class="scanBox">
    <video id="video" autoplay playsinline></video>
    <div id="percent">0%</div>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElev">
  <button onclick="kollaSvar()">Svara</button>
</div>

<script>
let bana=[];
let mode="none";
let steg=0;
let scanning=false;

let aktuellKontroll=null;
let aktuellFragaIndex=0;

let kartInput=document.getElementById("kartInput");
let bild=document.getElementById("bild");

/* ✅ LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* SPEL */
function startSpel(){

  if(bana.length===0){
    alert("Skapa bana först!");
    return;
  }

  mode="play";

  /* ✅ GÖM UPLOAD + KNAPPAR */
  kartLabel.style.display="none";
  editBtn.style.display="none";
  playBtn.style.display="none";

  spelUI.style.display="block";

  steg=0;
  bild.src=bana[0].bild;
}

/* VISA SCAN */
function visaScan(){
  spelUI.style.display="none";
  scan.style.display="block";

  referens.src=bana[steg].bild;
}

/* SCAN */
function startScan(){

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  })
  .then(stream=>{
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
      video.play();
      scanning=true;
      liveScan();
    };
  });
}

function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,200);
    return;
  }

  let c=document.createElement("canvas");
  let ctx=c.getContext("2d");

  c.width=100;
  c.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elev=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=()=>{

    let c2=document.createElement("canvas");
    let ctx2=c2.getContext("2d");

    c2.width=100;
    c2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let ref=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elev.length;i+=4){
      diff+=Math.abs(elev[i]-ref[i]);
    }

    let max=100*100*255;
    let p=Math.round((1-diff/max)*100);

    percent.innerText=p+"%";

    if(p>85){

      scanning=false;

      aktuellKontroll=bana[steg];
      aktuellFragaIndex=0;

      visaFraga();
      return;
    }

    setTimeout(liveScan,300);
  };
}

/* FRÅGA */
function visaFraga(){

  scan.style.display="none";
  fragaRuta.style.display="block";

  let f=aktuellKontroll.fragaLista[0];
  fragaText.innerText=f.fraga;
}

function kollaSvar(){

  steg++;

  if(steg < bana.length){
    fragaRuta.style.display="none";
    spelUI.style.display="block";
  } else {
    alert("🎉 Klar!");
  }
}
</script>

</body>
</html>
