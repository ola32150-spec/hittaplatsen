<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  margin: 0;
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: rgba(0,0,0,0.3);
}

/* KARTA */
#karta {
  position: relative;
}
#karta img {
  width: 100%;
  border-radius: 10px;
}

/* RING */
.plats {
  position: absolute;
  width: 28px;
  height: 28px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* KNAPPAR */
button {
  width: 90%;
  max-width: 350px;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  background: #2ecc71;
  color: white;
  font-size: 16px;
}

/* KORT (NY DESIGN) */
.card {
  background: white;
  color: black;
  padding: 12px;
  margin: 15px auto;
  border-radius: 16px;
  width: 90%;
  max-width: 350px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.card img,
.card video {
  width: 100%;
  border-radius: 12px;
}

/* UI RUTOR */
#editor, #scan, #fragaRuta {
  display: none;
}
</style>
</head>

<body>

<div id="topbar">
  ⭐ <span id="poang">0</span>
  ⏱️ <span id="tid">0</span>s
</div>

<h2>Kartjakten</h2>

<input type="file" id="kartInput">

<button onclick="setMode('edit')">Redigera</button>
<button onclick="setMode('play')">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- EDITOR -->
<div id="editor" class="card">
  <h3>Ny kontroll</h3>

  <input type="file" id="bildInput"><br><br>
  <input id="fragaInput" placeholder="Fråga"><br><br>
  <input id="svarInput" placeholder="Svar"><br><br>

  <button onclick="spara()">Spara</button>
</div>

<!-- ✅ NY SNYGG SCAN -->
<div id="scan">

  <h3>📸 Rikta kameran mot platsen</h3>

  <div class="card">
    <p>Referensbild</p>
    <img id="referens">
  </div>

  <div class="card">
    <p>Din kamera</p>
    <video id="video" autoplay></video>
  </div>

  <button onclick="startScan()">Scanna</button>
</div>

<!-- FRÅGA -->
<div id="fragaRuta" class="card">
  <h3 id="fragaText"></h3>
  <input id="svarElever"><br><br>
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[], mode="none";
let steg=0, poang=0, tid=0, timer=null;
let tempX=0,tempY=0;
let scanning=false;

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* KLICK */
karta.addEventListener("click", function(e){

  if(mode !== "edit"){
    alert("Tryck på Redigera först");
    return;
  }

  let rect = bild.getBoundingClientRect();
  tempX = e.clientX - rect.left;
  tempY = e.clientY - rect.top;

  let p=document.createElement("div");
  p.className="plats";
  p.style.top=tempY+"px";
  p.style.left=tempX+"px";

  karta.appendChild(p);

  editor.style.display="block";
}, true);

/* MODE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* SPARA */
function spara(){

  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let reader=new FileReader();

  reader.onload=e=>{
    obj.bild=e.target.result;
    bana.push(obj);
  };

  reader.readAsDataURL(bildInput.files[0]);

  editor.style.display="none";
  fragaInput.value="";
  svarInput.value="";
  bildInput.value="";
}

/* SPEL */
function startSpel(){
  steg=0; poang=0; tid=0;

  timer=setInterval(()=>{
    tid++;
    tidEl.innerText=tid;
  },1000);

  visaKarta();
}

function visaKarta(){
  referens.src=bana[steg].bild;
  scan.style.display="block";
}

/* SCAN START */
function startScan(){
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ exact:"environment"} }
  })
  .then(stream=>{
    video.srcObject=stream;
    scanning=true;
    liveScan();
  })
  .catch(()=>{
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    }).then(stream=>{
      video.srcObject=stream;
      scanning=true;
      liveScan();
    });
  });
}

/* LIVE SCAN */
function liveScan(){

  if(!scanning) return;

  if(!video.videoWidth){
    setTimeout(liveScan,300);
    return;
  }

  let canvas=document.createElement("canvas");
  let ctx=canvas.getContext("2d");

  canvas.width=100;
  canvas.height=100;

  ctx.drawImage(video,0,0,100,100);
  let elevData=ctx.getImageData(0,0,100,100).data;

  let img=new Image();
  img.src=referens.src;

  img.onload=function(){

    let canvas2=document.createElement("canvas");
    let ctx2=canvas2.getContext("2d");

    canvas2.width=100;
    canvas2.height=100;

    ctx2.drawImage(img,0,0,100,100);
    let refData=ctx2.getImageData(0,0,100,100).data;

    let diff=0;

    for(let i=0;i<elevData.length;i+=4){
      diff += Math.abs(elevData[i]-refData[i]);
      diff += Math.abs(elevData[i+1]-refData[i+1]);
      diff += Math.abs(elevData[i+2]-refData[i+2]);
    }

    let max=100*100*255*3;
    let procent=Math.round((1-diff/max)*100);

    if(procent > 90){

      alert("✅ ScanMatch ("+procent+"%)");

      scanning=false;

      scan.style.display="none";
      fragaRuta.style.display="block";
      fragaText.innerText=bana[steg].fraga;

      return;
    }

    setTimeout(liveScan,500);
  };
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    poang++;
    document.getElementById("poang").innerText=poang;

    steg++;

    if(steg<bana.length){
      visaKarta();
    }else{
      clearInterval(timer);
      alert("🎉 Klar! Tid: "+tid+" sek");
    }
  } else {
    feedback.innerText="Fel svar";
  }
}
</script>

</body>
</html>
