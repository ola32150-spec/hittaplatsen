<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kartjakten</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  margin: 0;
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: rgba(0,0,0,0.3);
}

#karta {
  position: relative;
}
#karta img {
  width: 100%;
  border-radius: 10px;
}

/* ✅ RÖDA RINGAR */
.plats {
  position: absolute;
  width: 28px;
  height: 28px;
  border: 4px solid red;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: #2ecc71;
  color: white;
}

#editor, #scan, #fragaRuta, #qrBox {
  display: none;
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div id="topbar">
  ⭐ <span id="poang">0</span>
  ⏱️ <span id="tid">0</span>s
</div>

<h2>Kartjakten</h2>

<input type="file" id="kartInput">

<button onclick="setMode('edit')">Redigera</button>
<button onclick="setMode('play')">Spela</button>

<div id="karta">
  <img id="bild">
</div>

<!-- ✅ NY RÄTT EDITOR -->
<div id="editor">
  <h3>Ny kontroll</h3>

  <p><b>1. Lägg till bild</b></p>
  <input type="file" id="bildInput"><br><br>

  <p><b>2. Skriv fråga</b></p>
  <input id="fragaInput" placeholder="Fråga"><br><br>

  <p><b>3. Skriv svar</b></p>
  <input id="svarInput" placeholder="Svar"><br><br>

  <button onclick="spara()">✅ Spara kontroll</button>
</div>

<!-- SPEL -->
<div id="scan">
  <h3>Hitta platsen</h3>
  <img id="referens"><br>
  <button onclick="klarScan()">Jag är här</button>
</div>

<div id="fragaRuta">
  <h3 id="fragaText"></h3>
  <input id="svarElever">
  <button onclick="kolla()">Svara</button>
  <p id="feedback"></p>
</div>

<script>
let bana=[], mode="none";
let steg=0, poang=0, tid=0, timer=null;
let tempX=0,tempY=0;

/* LADDA KARTA */
kartInput.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>bild.src=ev.target.result;
  r.readAsDataURL(e.target.files[0]);
};

/* ✅ STABIL KLICK – SKAPAR RING DIREKT */
document.getElementById("karta").addEventListener("click", function(e){

  if(mode !== "edit"){
    alert("Klicka på 'Redigera' först");
    return;
  }

  let rect = document.getElementById("bild").getBoundingClientRect();

  tempX = e.clientX - rect.left;
  tempY = e.clientY - rect.top;

  // ✅ skapa ring direkt
  let p = document.createElement("div");
  p.className = "plats";
  p.style.top = tempY + "px";
  p.style.left = tempX + "px";

  document.getElementById("karta").appendChild(p);

  document.getElementById("editor").style.display="block";

}, true);

/* LÄGE */
function setMode(m){
  mode=m;
  if(m==="play") startSpel();
}

/* ✅ SÄKER SPARA */
function spara(){

  if(!bildInput.files[0]){
    alert("Lägg till bild först!");
    return;
  }

  if(!fragaInput.value){
    alert("Skriv fråga!");
    return;
  }

  if(!svarInput.value){
    alert("Skriv svar!");
    return;
  }

  let obj={
    top:tempY,
    left:tempX,
    fraga:fragaInput.value,
    svar:svarInput.value,
    bild:null
  };

  let reader=new FileReader();

  reader.onload=e=>{
    obj.bild=e.target.result;
    bana.push(obj);
  };

  reader.readAsDataURL(bildInput.files[0]);

  editor.style.display="none";

  fragaInput.value="";
  svarInput.value="";
  bildInput.value="";
}

/* SPEL */
function startSpel(){
  steg=0;poang=0;tid=0;

  timer=setInterval(()=>{
    tid++;
    tidEl.innerText=tid;
  },1000);

  visaKarta();
}

function visaKarta(){
  referens.src=bana[steg].bild;
  scan.style.display="block";
}

function klarScan(){
  scan.style.display="none";
  fragaRuta.style.display="block";
  fragaText.innerText=bana[steg].fraga;
}

/* SVAR */
function kolla(){
  if(svarElever.value.toLowerCase()===bana[steg].svar.toLowerCase()){
    poang++;
    poangEl.innerText=poang;

    steg++;

    if(steg<bana.length){
      visaKarta();
    } else {
      clearInterval(timer);
      alert("Klar! Tid: "+tid);
    }
  } else {
    feedback.innerText="Fel";
  }
}
</script>

</body>
</html>
