<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fråga</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

.card {
  width: 90%;
  max-width: 400px;
  margin: 50px auto;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #2ecc71;
  border: none;
  color: white;
}

#feedback {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">

  <h2 id="fraga"></h2>

  <input id="svar" placeholder="Skriv svar">

  <button onclick="kolla()">Svara</button>

  <p id="feedback"></p>

</div>

<script>
let data;

/* HÄMTA DATA */
let params = new URLSearchParams(window.location.search);
data = JSON.parse(decodeURIComponent(params.get("data")));

document.getElementById("fraga").innerText = data.fraga;

/* KOLLA */
function kolla(){

  let svar = document.getElementById("svar").value.toLowerCase();

  if(svar === data.svar.toLowerCase()){

    alert("✅ Rätt!");

    window.history.back(); // tillbaka till spelet

  } else {

    document.getElementById("feedback").innerText = "❌ Fel, försök igen";

  }
}
</script>

</body>
</html>
