<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.box {
  width:90%;
  max-width:400px;
  margin:60px auto;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

  <h2 id="fraga"></h2>

  <input id="svar" placeholder="Skriv svar">

  <button onclick="kolla()">Svara</button>

  <p id="feedback"></p>

</div>

<script>
let params = new URLSearchParams(window.location.search);
let data = JSON.parse(decodeURIComponent(params.get("data")));

document.getElementById("fraga").innerText = data.fraga;

function kolla(){

  let svar = document.getElementById("svar").value.toLowerCase();

  if(svar === data.svar.toLowerCase()){
    alert("✅ Rätt!");
    window.history.back();
  } else {
    feedback.innerText = "❌ Fel svar";
  }
}
</script>

</body>
</html>
